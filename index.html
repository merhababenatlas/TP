<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Texture Painter</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#121212">
</head>
<body>
    <div id="canvas-container"></div>
    
    <!-- Title Panel (Top Left) -->
    <div class="panel title-panel" id="main-menu-panel">
        <button class="borderless-btn" id="btn-main-menu" style="font-size:16px; font-weight:600; padding: 12px 16px; display: flex; align-items: center; gap: 8px;">
            Texture Painter <span id="menu-arrow" style="font-size: 12px; transition: transform 0.3s;">☰</span>
        </button>
    </div>

    <!-- Main Menu Overlay -->
    <div id="main-menu-overlay" class="hidden" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.85); z-index:9999; display:flex; justify-content:center; align-items:center; flex-direction:column; backdrop-filter: blur(10px);">
        <div id="main-menu-content" class="custom-confirm-box" style="display:flex; flex-direction:column; gap:12px; width: 300px;">
            <h2 style="margin-top:0; color:#fff; margin-bottom: 10px; font-weight: 600;">Menü</h2>
            <button class="borderless-btn" id="btn-import-model" style="background: rgba(255,255,255,0.1); width: 100%; text-align: center; justify-content: center;">📁 Model Yükle</button>
            <button class="borderless-btn" id="btn-export" style="background: rgba(255,255,255,0.1); width: 100%; text-align: center; justify-content: center;">💾 Kaydet</button>
            <button class="borderless-btn" id="btn-manual-refresh" style="background: rgba(255,255,255,0.1); width: 100%; text-align: center; justify-content: center;">🔄 Yenile</button>
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 8px 0;">
            <button class="borderless-btn" id="btn-host-pc" style="background: rgba(74,222,128,0.15); color: #4ade80; width: 100%; text-align: center; justify-content: center;">💻 PC Olarak Kur</button>
            <button class="borderless-btn" id="btn-connect-tablet" style="background: rgba(96,165,250,0.15); color: #60a5fa; width: 100%; text-align: center; justify-content: center;">📱 Tabletten Bağlan</button>
            <button id="btn-close-menu" class="btn-cancel" style="margin-top:15px; width:100%; padding: 12px; font-weight: bold; border-radius: 8px; border: none; font-size: 16px;">Kapat</button>
        </div>
    </div>

    <!-- Actions Panel (Bottom Center) -->
    <div class="panel actions-panel">
        <button class="borderless-btn" id="btn-cull-mode">🔄 Yön: Ön</button>
        <button class="borderless-btn" id="btn-lit-mode">💡 Işık: Kapalı</button>
        <button class="borderless-btn" id="btn-wireframe">🕸 Ağ: Kapalı</button>
        <button class="borderless-btn" id="btn-axes">📍 Eksen: Kapalı</button>
        <input type="file" id="file-import-model" accept=".obj" style="display: none;">
        <input type="file" id="file-import-image" accept="image/*" style="display: none;">
    </div>

    <!-- Tools Panel (Top Center) -->
    <div class="panel tools-panel">
        <div class="tool-group-horizontal">
            <button class="tool-btn active" data-tool="brush" id="btn-brush" title="Fırça (B)">🖌️</button>
            <button class="tool-btn" data-tool="eraser" id="btn-eraser" title="Silgi (E)">🧽</button>
            <button class="tool-btn" data-tool="blur" id="btn-blur" title="Bulanıklaştırma">💧</button>
            <button class="tool-btn" data-tool="smear" id="btn-smear" title="Sıvama / Sürükleme">👈</button>
            <button class="tool-btn" data-tool="picker" id="btn-picker" title="Renk Seçici (I)">
                📍
                <div id="picker-preview" class="hidden"></div>
            </button>
            <div style="width: 1px; background: rgba(255,255,255,0.2); height: 30px; margin: 0 5px;"></div>
            <div class="color-picker-wrapper">
                <input type="color" id="color-picker" value="#3296ff" title="Fırça Rengi">
            </div>
        </div>
    </div>

    <!-- Layers Panel (Top Right) -->
    <div class="panel layers-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; padding: 0 5px;">
            <span style="font-size: 12px; font-weight: 500; color: #aaa;">Katmanlar</span>
            <button class="borderless-btn" id="btn-add-layer" style="font-size: 16px; padding: 2px 5px;" title="Yeni Katman">+</button>
        </div>
        <div class="layer-list" id="layer-list">
            <!-- Layers injected by JS -->
        </div>
    </div>

    <!-- Sliders & Color Panel (Left Center) -->
    <div class="panel sliders-panel">
        <div class="slider-group">
            <div class="slider-container">
                <span title="Boyut">⭕</span>
                <div class="vertical-slider-wrapper">
                    <input type="range" id="size-slider" min="1" max="100" value="50">
                </div>
            </div>
            <div class="slider-container">
                <span title="Yoğunluk">🌊</span>
                <div class="vertical-slider-wrapper">
                    <input type="range" id="intensity-slider" min="0" max="100" value="50">
                </div>
            </div>
            <div class="slider-container">
                <span title="Sertlik">🌫</span>
                <div class="vertical-slider-wrapper">
                    <input type="range" id="hardness-slider" min="0" max="100" value="50">
                </div>
            </div>
        </div>
    </div>

    <!-- History Panel (Bottom Left) -->
    <div class="panel history-panel">
        <button class="tool-btn" id="btn-undo" title="Geri Al (Ctrl+Z)">
            ↩️<span id="undo-count" class="history-badge"></span>
        </button>
        <button class="tool-btn" id="btn-redo" title="İleri Al (Ctrl+Alt+Z)">
            ↪️<span id="redo-count" class="history-badge"></span>
        </button>
    </div>

    <!-- Texture Preview Overlay -->
    <div id="texture-preview-overlay" class="hidden">
        <div class="texture-preview-content">
            <div class="preview-controls">
                <button id="btn-toggle-uv" class="borderless-btn">🕸 UV Ağı: Kapalı</button>
                <button id="btn-close-preview" class="borderless-btn">✕ Kapat</button>
            </div>
            <div class="preview-image-container">
                <img id="texture-preview-image" src="" alt="Texture Preview">
                <img id="uv-wireframe-image" src="" alt="UV Wireframe" class="hidden">
            </div>
        </div>
    </div>

    <!-- Custom Confirm Modal -->
    <div id="custom-confirm-overlay" class="hidden">
        <div class="custom-confirm-box">
            <h3 id="custom-confirm-title">Emin misiniz?</h3>
            <p id="custom-confirm-message">Bu işlemi geri alamazsınız.</p>
            <div class="custom-confirm-actions">
                <button id="custom-confirm-cancel" class="btn-cancel">İptal</button>
                <button id="custom-confirm-ok" class="btn-danger">Sil</button>
            </div>
        </div>
    </div>

    <!-- Network UI -->
    <!-- Host QR Modal -->
    <div id="host-qr-overlay" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index: 9999; display:flex; justify-content:center; align-items:center; flex-direction:column;">
        <div style="background:var(--panel-bg); padding:24px; border-radius:12px; border:none; text-align:center;">
            <h3 style="margin-top:0; color:#fff;">PC Host Modu</h3>
            <p style="color:#aaa; font-size:14px; max-width:250px;">Tabletten "Tabletten Bağlan" seçeneğine tıklayıp bu QR kodu okutun.</p>
            <div id="qrcode-container" style="background:#fff; padding:16px; border-radius:8px; margin:16px auto; display:inline-block;"></div>
            <p id="host-status" style="color:#4ade80; font-weight:600; font-size:14px;">Bağlantı bekleniyor...</p>
            <button id="btn-close-host" class="btn-cancel" style="margin-top:12px; width:100%;">İptal</button>
        </div>
    </div>

    <!-- QR Reader Modal -->
    <div id="qr-reader-overlay" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index: 9999; display:flex; justify-content:center; align-items:center; flex-direction:column;">
        <div style="background:var(--panel-bg); padding:16px; border-radius:12px; width:90%; max-width:400px; text-align:center;">
            <h3 style="margin-top:0; color:#fff;">Bilgisayara Bağlan</h3>
            <div id="qr-reader" style="width:100%; margin:16px auto;"></div>
            <button id="btn-close-reader" class="btn-cancel" style="width:100%;">İptal</button>
        </div>
    </div>

    <!-- Update Toast Notification -->
    <div id="update-toast" class="hidden" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #3b82f6; color: white; padding: 24px; border-radius: 16px; z-index: 10000; display: flex; flex-direction: column; align-items: center; gap: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); font-size: 18px; text-align: center; width: 85%; max-width: 320px;">
        <span style="font-weight: 600;">✨ Yeni Bir Sürüm Mevcut! ✨</span>
        <span style="font-size: 14px; opacity: 0.9;">Uygulamayı güncellemek için lütfen yenileyin.</span>
        <button id="btn-update-app" style="background: white; color: #3b82f6; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: transform 0.2s;">Şimdi Yenile</button>
    </div>

    <!-- Libraries -->
    <!-- PeerJS for WebRTC -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- HTML5 QRCode for scanning -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <!-- QRCode JS for generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script src="./js/lib/three.min.js"></script>
    <script src="./js/lib/OrbitControls.js"></script>
    <script src="./js/lib/OBJLoader.js"></script>

    <!-- Tools -->
    <script src="./js/tools/Utils.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/globals.js"></script>
    <script src="./js/HistoryManager.js"></script>
    <script src="./js/PaintShaders.js"></script>
    <script src="./js/LayerManager.js"></script>
    <script src="./js/UIManager.js"></script>
    <script src="./js/ThreeEngine.js"></script>
    <script src="./js/NetworkManager.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
